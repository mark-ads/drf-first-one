services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:${DB_PORT}"
   
  redis:
    image: redis:7
    ports:
      - "6379:${REDIS_PORT}"

  celery_worker:
    build: .
    env_file: 
      - .env
    volumes:
      - media:/app/media
      - ./logs:/app/media
    command: sh -c "sleep ${WAIT_PG_SEC} && sleep 10 && celery -A first_one worker -P solo -l info"
    depends_on:
     - redis
     - postgres

  celery_beat:
    build: .
    env_file: 
      - .env
    volumes:
      - media:/app/media
      - ./logs:/app/media
    command: sh -c "sleep ${WAIT_PG_SEC} && sleep 10 && celery -A first_one beat -l info"
    depends_on:
     - redis
     - postgres

  django:
    env_file: 
      - .env
    build: .
    ports:
      - "${DJANGO_PORT}:${DJANGO_PORT}"
    volumes:
      - media:/app/media
      - ./logs:/app/media
    command: sh -c "sleep ${WAIT_PG_SEC} && python manage.py makemigrations && python manage.py migrate && python manage.py populate_db && python manage.py runserver 0.0.0.0:${DJANGO_PORT}"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  media:
